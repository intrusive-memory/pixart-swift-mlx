name: Tests

on:
  pull_request:
    branches: [main, development]

env:
  ACERVO_APP_GROUP_ID: group.intrusive-memory.models

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-macos:
    name: Test on macOS
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Test (with coverage)
        run: |
          mkdir -p Build
          xcodebuild test \
            -scheme pixart-swift-mlx \
            -destination 'platform=macOS,arch=arm64' \
            -enableCodeCoverage YES \
            -resultBundlePath Build/test.xcresult

      - name: Coverage summary
        run: |
          echo "PixArtBackbone target line coverage:"
          xcrun xccov view --report --only-targets Build/test.xcresult | grep -E "PixArtBackbone\b" || echo "(target not found in coverage report)"

      - name: Upload coverage result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage
          path: Build/test.xcresult
          retention-days: 14

